<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Officer Login - Traffic Monitoring</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .login-wrapper{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 16px;
    }

    .login-card{
      width:420px;
      padding:32px;
    }

    .login-logo{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }

    .login-logo img{
      width:70px;
      height:70px;
      border-radius:18px;
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      object-fit:cover;
    }

    .login-title{
      font-size:22px;
      font-weight:800;
      margin:0;
    }

    .login-sub{
      font-size:13px;
      color:var(--muted);
      margin-top:4px;
      text-align:center;
    }

    .form-group{
      margin-bottom:14px;
    }

    .form-group input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      font-size:14px;
    }

    .error{
      background:#ffe9e9;
      color:#b91c1c;
      padding:10px;
      border-radius:10px;
      font-size:13px;
      margin-bottom:14px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="card login-card">

    <div class="login-logo">
      <img src="/static/LOGO.jpg" alt="Logo">
      <div class="login-title">Traffic Monitoring System</div>
      <div class="login-sub">
        Officer Portal Login
      </div>
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="form-group">
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <button class="btn btn-primary" style="width:100%; margin-top:6px;">
        Login
      </button>
    </form>

    <div style="margin-top:18px; text-align:center; font-size:12px; color:var(--muted);">
      Demo Login → officer / 1234
    </div>

  </div>
</div>

</body>
</html>
