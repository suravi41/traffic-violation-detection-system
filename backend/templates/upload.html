<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Upload - Traffic Monitoring</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <div class="navbar">
    <div class="nav-inner">
      <div class="brand">
        <img src="/static/LOGO.jpg" alt="Logo">
        <div>Traffic Monitoring</div>
      </div>

      <div class="navlinks">
        <a href="/home">Home</a>
        <a href="/services">Services</a>
        <a class="active" href="/upload">Upload</a>
        <a href="/evidence">Evidence</a>
        <a href="/profile">Profile</a>
      </div>

      <div class="nav-actions">
        <a class="btn btn-outline" href="/logout">Logout</a>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="card card-pad">
      <h2 class="section-title">Upload Traffic Image</h2>
      <p class="muted">Upload an image to detect helmets and license plates.</p>

      <form id="uploadForm">
        <div class="drop">
          <input type="file" id="imageInput" accept="image/*" required>
        </div>

        <div style="margin-top:14px;">
          <button class="btn btn-primary" style="width:100%;">Run Detection</button>
        </div>
      </form>

      <div id="previewSection" style="margin-top:20px; display:none;">
        <h4>Preview</h4>
        <div class="imgbox">
          <img id="previewImg">
        </div>
      </div>

      <div class="muted" id="status" style="margin-top:12px;"></div>
    </div>

  </div>

<script>
  const fileInput = document.getElementById("imageInput");
  const previewSection = document.getElementById("previewSection");
  const previewImg = document.getElementById("previewImg");
  const statusEl = document.getElementById("status");

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;
    previewImg.src = URL.createObjectURL(file);
    previewSection.style.display = "block";
  });

  document.getElementById("uploadForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const file = fileInput.files[0];
    if (!file) return;

    statusEl.innerText = "Detecting... Please wait.";

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/detect/all", { method: "POST", body: formData });
    const data = await response.json();

    // Redirect to server-side result
    window.location.href = "/result?file=" + encodeURIComponent(data.evidence_json_saved_as);
  });
</script>

</body>
</html>
